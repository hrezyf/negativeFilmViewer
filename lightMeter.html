<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Light Meter</title>
    </head>
    <body>
    <div class="container">
        <h1>测光表应用</h1>

        <div class="camera-section">
            <h2>摄像头预览</h2>
            <video id="camera-preview" autoplay playsinline></video>
            <div class="camera-controls">
                <button id="start-camera">启动摄像头</button>
                <button id="stop-camera">停止摄像头</button>
            </div>
        </div>

        <div class="parameters-section">
            <h2>曝光参数</h2>

            <div class="parameter-display">
                <div class="parameter-item">
                    <span class="parameter-label">光圈值:</span>
                    <span id="aperture-value" class="parameter-value">--</span>
                </div>

                <div class="parameter-item">
                    <span class="parameter-label">ISO:</span>
                    <span id="iso-value" class="parameter-value">100</span>
                </div>

                <div class="parameter-item">
                    <span class="parameter-label">快门速度:</span>
                    <span id="shutter-value" class="parameter-value">1/100</span>
                </div>

                <div class="parameter-item">
                    <span class="parameter-label">曝光补偿:</span>
                    <span id="exposure-value" class="parameter-value">0 EV</span>
                </div>
            </div>

            <div class="parameter-controls">
                <div class="control-group">
                    <label for="iso-slider">ISO (100-6400)</label>
                    <input type="range" id="iso-slider" min="100" max="6400" value="100" step="100">
                    <div class="slider-value" id="iso-slider-value">100</div>
                </div>

                <div class="control-group">
                    <label for="shutter-slider">快门速度 (1/8000 - 2s)</label>
                    <input type="range" id="shutter-slider" min="0" max="13" value="9" step="1">
                    <div class="slider-value" id="shutter-slider-value">1/100</div>
                </div>

                <div class="control-group">
                    <label>曝光补偿 (1/3 EV 步进)</label>
                    <div class="exposure-compensation">
                        <button class="ec-button ec-minus" data-value="-0.33">-</button>
                        <div class="ec-display" id="ec-display">0 EV</div>
                        <button class="ec-button ec-plus" data-value="0.33">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="lightMeter.js"></script>
</body>

</html>
